name: 📝 Daily Board Auto Post

on:
  schedule:
    # 매일 00:15 UTC = 09:15 KST (news 09:00 / events 09:30 사이)
    - cron: '15 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate daily board post
        run: node scripts/auto-board-post.js

      - name: Commit & push if changed
        run: |
          git config user.name  "fire-sugi-bot"
          git config user.email "bot@firesugi.local"
          git add board-auto.json
          if git diff --cached --quiet; then
            echo "ℹ️  변경 없음 - 커밋 스킵"
          else
            COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('board-auto.json')).length)")
            git commit -m "📝 daily board post ($(date -u +%Y-%m-%d) · 전체 ${COUNT}건)"
            git push
            echo "✅ 푸시 완료"
          fi
