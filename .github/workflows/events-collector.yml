name: 🎁 Daily Events Collection

on:
  schedule:
    # 매일 23:00 UTC = 다음날 08:00 KST 실행
    # (news 09:00 · board 09:15 KST 와 겹치지 않음)
    - cron: '0 23 * * *'
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Collect events from RSS feeds
        run: node scripts/collect-events.js

      - name: Send Telegram notification (신규 있을 때만)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/notify-telegram.js events

      - name: Commit & push if changed
        run: |
          git config user.name  "fire-sugi-bot"
          git config user.email "bot@firesugi.local"
          rm -f events/_new-this-run.json
          git add events/events.json subscribers/telegram.json
          if git diff --cached --quiet; then
            echo "ℹ️  변경 없음 - 커밋 스킵"
          else
            TRAVEL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('events/events.json')).travel.length)")
            GIVE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('events/events.json')).giveaways.length)")
            COFFEE=$(node -e "console.log((JSON.parse(require('fs').readFileSync('events/events.json')).coffee||[]).length)")
            SUBS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('subscribers/telegram.json')).subscribers.length)")
            git commit -m "🎁 daily events ($(date -u +%Y-%m-%d) · travel ${TRAVEL} · give ${GIVE} · coffee ${COFFEE} · subs ${SUBS})"
            git push
            echo "✅ 푸시 완료"
          fi
