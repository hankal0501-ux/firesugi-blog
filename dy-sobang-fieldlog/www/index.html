<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>대영소방 현장기록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --bg-2: #131826;
    --bg-3: #1c2236;
    --border: #2a3148;
    --text: #e8ecf3;
    --muted: #8893a8;
    --accent: #ffd60a;
    --danger: #ff3b30;
    --success: #34c759;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', -apple-system, sans-serif; min-height: 100vh; }
  body { padding-bottom: 80px; }
  button, textarea, input { font-family: inherit; }

  .header {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg);
    z-index: 10;
  }
  .header .tag {
    font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
    color: var(--accent); text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }
  .header .title { font-size: 22px; font-weight: 800; margin-top: 2px; letter-spacing: -0.5px; }
  .header .stats {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--muted); margin-top: 4px;
    display: flex; align-items: center;
  }
  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--success);
    border-radius: 50%;
    margin-right: 8px;
    animation: blink 2s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .capture-area { padding: 16px; }

  .form-section {
    background: var(--bg-2);
    border: 1px solid var(--border);
    padding: 14px;
    margin-bottom: 14px;
  }
  .field-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .field-row:last-of-type { margin-bottom: 0; }
  .field-label {
    flex: 0 0 50px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .field-input {
    flex: 1;
    background: var(--bg-3);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 10px 12px;
    font-size: 15px;
    font-weight: 600;
    min-width: 0;
  }
  .field-input:focus { border-color: var(--accent); outline: none; }
  .field-input::placeholder { color: var(--muted); font-weight: 400; }
  .field-row-combined { gap: 8px; }
  .field-input-site { flex: 1 1 auto; min-width: 0; }
  .field-input-floor { flex: 0 0 90px; min-width: 0; text-align: center; }
  .address-display.compact {
    margin-top: 8px;
    padding: 6px 10px;
    font-size: 11px;
    border-left-width: 2px;
  }
  .address-display.compact .addr-icon { font-size: 12px; }
  .address-display.compact .addr-text { font-size: 11px; letter-spacing: -0.2px; }

  .address-display {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-top: 12px;
    padding: 10px 12px;
    background: var(--bg-3);
    border-left: 3px solid var(--accent);
    font-size: 12px;
    line-height: 1.4;
    min-height: 38px;
  }
  .address-display .addr-icon { font-size: 14px; flex-shrink: 0; }
  .address-display .addr-text { color: var(--text); word-break: break-word; }
  .address-display.loading .addr-text { color: var(--muted); font-style: italic; }
  .address-display.empty { border-left-color: var(--border); }
  .address-display.empty .addr-text { color: var(--muted); }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 20px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform 0.1s;
    letter-spacing: -0.3px;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary svg { width: 22px; height: 22px; stroke-width: 2.5; }

  .preview-photo {
    width: 100%;
    margin-top: 12px;
    border: 1px solid var(--border);
    aspect-ratio: 4/3;
    background: var(--bg-2);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 12px;
    overflow: hidden;
    position: relative;
  }
  .preview-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .preview-photo .badge {
    position: absolute; top: 8px; left: 8px;
    background: rgba(0,0,0,0.7); color: var(--accent);
    padding: 4px 8px; font-size: 10px; font-weight: 700;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 1px;
  }

  .memo-area { margin-top: 12px; }

  .btn-mic {
    width: 100%;
    background: var(--bg-3);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 16px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .btn-mic svg { width: 20px; height: 20px; stroke-width: 2.5; }
  .btn-mic.recording {
    background: var(--danger);
    border-color: var(--danger);
    color: #fff;
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,59,48,0.4); }
    50% { box-shadow: 0 0 0 12px rgba(255,59,48,0); }
  }

  textarea.memo {
    width: 100%;
    min-height: 110px;
    background: var(--bg-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 14px;
    font-size: 15px;
    line-height: 1.5;
    resize: vertical;
  }
  textarea.memo:focus { border-color: var(--accent); outline: none; }
  textarea.memo::placeholder { color: var(--muted); }

  .action-row { display: grid; grid-template-columns: 1fr 56px; gap: 8px; margin-top: 10px; }
  .btn-save {
    background: var(--success); color: #000; border: none; padding: 16px;
    font-weight: 800; font-size: 15px; cursor: pointer; letter-spacing: -0.3px;
    border-radius: 6px;
  }
  .btn-save:active { opacity: 0.85; }
  .btn-clear {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    padding: 0; font-size: 20px; cursor: pointer; font-weight: 700;
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .btn-clear:active { background: var(--bg-3); color: var(--text); }

  .records-section {
    border-top: 1px solid var(--border);
    margin-top: 20px;
    padding: 20px 16px;
  }
  .section-label {
    font-size: 11px;
    letter-spacing: 2.5px;
    font-weight: 700;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .section-label .count {
    color: var(--accent);
    background: var(--bg-2);
    padding: 4px 10px;
    border: 1px solid var(--border);
  }

  .record-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    margin-bottom: 8px;
    padding: 12px;
    display: grid;
    grid-template-columns: 72px 1fr;
    gap: 12px;
    position: relative;
  }
  .record-card .thumb {
    width: 72px; height: 72px; object-fit: cover; background: var(--bg-3);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 10px;
  }
  .record-card .body { display: flex; flex-direction: column; gap: 4px; min-width: 0; padding-right: 48px; }
  .record-card .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1.2px;
    text-transform: uppercase;
  }
  .record-card .site-line {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .record-card .floor-badge {
    display: inline-block;
    background: var(--accent);
    color: #000;
    padding: 1px 6px;
    font-size: 10px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
  }
  .record-card .text {
    font-size: 13px;
    line-height: 1.45;
    color: var(--text);
    word-break: break-word;
  }
  .record-card .text em { color: var(--muted); font-style: normal; }
  .record-card .addr {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    line-height: 1.3;
  }
  .record-card .actions {
    position: absolute; top: 6px; right: 6px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .record-card .actions button {
    background: none; border: none; color: var(--muted);
    font-size: 14px; cursor: pointer; padding: 4px 6px;
    line-height: 1;
  }
  .record-card .actions button:hover { color: var(--text); }
  .record-card .actions .btn-share { color: var(--accent); }

  .empty-state {
    padding: 36px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    border: 1px dashed var(--border);
  }

  .footer-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 8px;
    z-index: 10;
  }
  .footer-bar button {
    padding: 14px;
    font-size: 13px;
    font-weight: 700;
    border: 1px solid var(--border);
    background: var(--bg-3);
    color: var(--text);
    cursor: pointer;
    letter-spacing: -0.2px;
  }
  .footer-bar button.export {
    background: var(--accent); color: #000; border-color: var(--accent);
  }

  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    background: var(--bg-3); border: 1px solid var(--accent); color: var(--accent);
    padding: 10px 18px; font-size: 12px; font-weight: 700;
    z-index: 100;
    opacity: 0; transition: opacity 0.25s;
    pointer-events: none;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1.5px;
    max-width: 90vw;
    text-align: center;
  }
  .toast.show { opacity: 1; }

  #cameraInput { display: none; }

  .interim-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
  }

  /* ===== Update modal ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s ease-out;
  }
  .modal-overlay[hidden] { display: none; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-top: 4px solid var(--accent);
    max-width: 360px;
    width: 100%;
    padding: 24px 20px 18px;
    animation: slideUp 0.25s ease-out;
  }
  .modal-icon {
    font-size: 40px;
    text-align: center;
    margin-bottom: 8px;
  }
  .modal-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    text-align: center;
    letter-spacing: -0.3px;
    margin-bottom: 14px;
  }
  .version-compare {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    margin-bottom: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
  }
  .version-current { color: var(--muted); text-decoration: line-through; }
  .version-arrow { color: var(--accent); font-size: 18px; }
  .version-new { color: var(--accent); font-size: 16px; }
  .modal-notes {
    background: var(--bg-3);
    border-left: 3px solid var(--accent);
    padding: 12px;
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 18px;
    white-space: pre-wrap;
    max-height: 200px;
    overflow-y: auto;
    word-break: break-word;
  }
  .modal-notes:empty::before {
    content: '변경사항 정보 없음';
    color: var(--muted);
    font-style: italic;
  }
  .modal-actions {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }

  /* === 업데이트 2단계 가이드 === */
  .upgrade-steps {
    display: flex; flex-direction: column; gap: 10px;
    margin: 14px 0 16px;
  }
  .upgrade-step {
    display: flex; gap: 10px;
    padding: 10px;
    background: var(--bg-3);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
  }
  .step-no {
    flex: 0 0 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent);
    color: #000;
    font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .step-body { flex: 1; min-width: 0; }
  .step-title {
    font-weight: 800; font-size: 13px;
    color: var(--text);
    margin-bottom: 3px;
  }
  .step-desc {
    font-size: 11px; color: var(--muted);
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .step-btn {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: -0.3px;
  }
  .step-btn-warn {
    background: var(--danger);
    color: #fff;
  }
  .step-btn-primary {
    background: var(--accent);
    color: #000;
  }
  .step-btn:active { opacity: 0.85; }
  .modal-actions button {
    padding: 14px 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    border: 1px solid var(--border);
    cursor: pointer;
    letter-spacing: -0.2px;
  }
  .btn-modal-skip {
    background: transparent;
    color: var(--muted);
  }
  .btn-modal-primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }
  .modal-actions.force .btn-modal-skip { display: none; }
  .modal-actions.force { grid-template-columns: 1fr; }

  .tag {
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .tag:active { opacity: 0.6; }

  /* === 업데이트 신호등 === */
  .update-light {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #6b7280;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.25) inset;
    transition: background 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
  }
  .update-light.checking {
    background: #fbbf24;
    box-shadow: 0 0 6px #fbbf24, 0 0 0 1px rgba(0,0,0,0.25) inset;
    animation: pulse-light 1s infinite;
  }
  .update-light.ok {
    background: #22c55e;
    box-shadow: 0 0 6px #22c55e, 0 0 0 1px rgba(0,0,0,0.25) inset;
  }
  .update-light.new {
    background: #ef4444;
    box-shadow: 0 0 8px #ef4444, 0 0 0 1px rgba(0,0,0,0.25) inset;
    animation: pulse-light 1.2s infinite;
  }
  .update-light.error {
    background: #6b7280;
    box-shadow: 0 0 0 1px rgba(239,68,68,0.5) inset;
  }
  @keyframes pulse-light {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }
  .update-status-text {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 1px 5px;
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
    margin-left: 2px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* === 탭 바 === */
  .tab-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin: 12px;
    overflow: hidden;
  }
  .tab-btn {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 12px 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
    border-right: 1px solid var(--border);
  }
  .tab-btn:last-child { border-right: none; }
  .tab-btn.active {
    background: var(--accent);
    color: #000;
  }
  .tab-btn:active { opacity: 0.85; }
  .tab-count {
    display: inline-block;
    margin-left: 4px;
    padding: 1px 6px;
    background: rgba(0,0,0,0.18);
    border-radius: 10px;
    font-size: 11px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }
  .tab-btn:not(.active) .tab-count {
    background: var(--bg-3);
    color: var(--muted);
  }
  .tab-panel { display: block; }
  .tab-panel[hidden] { display: none; }

  /* === 리스트 일괄 액션 === */
  .list-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--bg-3);
    border-radius: 6px;
    margin: 0 12px 8px;
    font-size: 12px;
  }
  .select-all-row {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
    font-weight: 600;
    cursor: pointer;
  }
  .select-all-row input[type=checkbox] {
    width: 18px; height: 18px;
    accent-color: var(--accent);
  }
  .selected-info {
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .list-actions {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin: 0 12px 10px;
  }
  .list-action-btn {
    background: var(--bg-3);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 10px 6px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border-radius: 6px;
    font-family: inherit;
  }
  .list-action-btn.primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }
  .list-action-btn.danger {
    color: var(--danger);
    border-color: rgba(239,68,68,0.3);
  }
  .list-action-btn:active { opacity: 0.8; }

  /* 카드 체크박스 */
  .record-card { position: relative; }
  .record-chk {
    position: absolute;
    top: 8px; left: 8px;
    width: 20px; height: 20px;
    accent-color: var(--accent);
    z-index: 2;
  }
</style>
</head>
<body>

<div class="header">
  <div class="tag" id="versionTag" title="탭하여 업데이트 확인">
    <span class="update-light unknown" id="updateLight" title="업데이트 상태"></span>
    DY-SOBANG · FIELD LOG · v<span id="appVer">1.0.0</span>
    <span class="update-status-text" id="updateStatusText">확인 중</span>
  </div>
  <div class="title">현장 기록</div>
  <div class="stats">
    <span class="status-dot"></span>
    <span id="recordCount">000</span>건 · <span id="dateLabel"></span>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="capture">📸 사진 촬영</button>
  <button class="tab-btn" data-tab="list">📋 사진 리스트 <span class="tab-count" id="tabCount">0</span></button>
</div>

<div class="tab-panel" id="panelCapture">
  <div class="capture-area">
    <div class="form-section">
      <div class="field-row field-row-combined">
        <input class="field-input field-input-site" id="inputSite" list="siteList" placeholder="사업장 (예: 호반써밋)" autocomplete="off" autocapitalize="none">
        <datalist id="siteList"></datalist>
        <input class="field-input field-input-floor" id="inputFloor" placeholder="층수" autocomplete="off">
      </div>
      <div class="address-display compact" id="addressDisplay">
        <span class="addr-icon">📍</span>
        <span class="addr-text" id="addressText">위치자동</span>
      </div>
    </div>

    <button class="btn-primary" id="btnCamera">

<script>
  // ============ CONFIG (edit before each release) ============
  const APP_VERSION = '1.2.2';
  const UPDATE_CHECK_URL = 'https://hankal0501-ux.github.io/firesugi-blog/dy-sobang/version.json';
  // ============================================================

  // ===== State =====
  let currentPhoto = null;
  let currentGps = null;          // {lat, lon, accuracy}
  let currentAddress = null;      // reverse-geocoded string
  let geoFetchInFlight = false;
  let records = [];

  // ===== Storage (IndexedDB — saves to phone, persists offline) =====
  const Store = {
    db: null,
    async open() {
      if (this.db) return this.db;
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('dysobang_fieldlog', 1);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('records')) {
            db.createObjectStore('records', { keyPath: 'id' });
          }
        };
        req.onsuccess = (e) => { this.db = e.target.result; resolve(this.db); };
        req.onerror = (e) => reject(e.target.error);
      });
    },
    async load() {
      try {
        await this.open();
        await new Promise((resolve) => {
          const tx = this.db.transaction('records', 'readonly');
          const req = tx.objectStore('records').getAll();
          req.onsuccess = () => {
            records = (req.result || []).sort((a,b) => b.id - a.id);
            resolve();
          };
          req.onerror = () => { records = []; resolve(); };
        });
      } catch(e) {
        console.error('DB open failed:', e);
        records = [];
        toast('저장소 초기화 실패');
      }
      renderList();
    },
    async put(rec) {
      try {
        await this.open();
        return new Promise((resolve, reject) => {
          const tx = this.db.transaction('records', 'readwrite');
          tx.objectStore('records').put(rec);
          tx.oncomplete = () => resolve();
          tx.onerror = (e) => reject(e.target.error);
        });
      } catch(e) { console.error('put failed:', e); toast('저장 실패'); }
    },
    async remove(id) {
      try {
        await this.open();
        return new Promise((resolve, reject) => {
          const tx = this.db.transaction('records', 'readwrite');
          tx.objectStore('records').delete(id);
          tx.oncomplete = () => resolve();
          tx.onerror = (e) => reject(e.target.error);
        });
      } catch(e) { console.error('remove failed:', e); }
    },
    async clear() {
      try {
        await this.open();
        return new Promise((resolve, reject) => {
          const tx = this.db.transaction('records', 'readwrite');
          tx.objectStore('records').clear();
          tx.oncomplete = () => resolve();
          tx.onerror = (e) => reject(e.target.error);
        });
      } catch(e) { console.error('clear failed:', e); }
    }
  };

  // ===== Toast =====
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 1800);
  }

  // ===== Date label =====
  function updateDateLabel() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,'0');
    const d = String(now.getDate()).padStart(2,'0');
    document.getElementById('dateLabel').textContent = `${y}-${m}-${d}`;
  }

  // ===== Camera + Location =====
  document.getElementById('btnCamera').addEventListener('click', () => {
    document.getElementById('cameraInput').click();
    prefetchLocation();  // GPS/address fetch in parallel while user takes photo
  });

  document.getElementById('cameraInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    // 최상 화질 — 다운스케일 없음 (4000px까지), JPEG 품질 0.98
    const compressed = await compressImage(file, 4000, 0.98);
    currentPhoto = compressed;  // raw photo (will be re-stamped on save with latest metadata)
    const box = document.getElementById('previewBox');
    const now = new Date();
    const ts = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    box.innerHTML = `<img src="${compressed}" alt="현장 사진"><span class="badge">${ts}</span>`;
    toast('사진 캡처 완료');
  });

  async function compressImage(file, maxWidth, quality) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const scale = Math.min(1, maxWidth / img.width);
          canvas.width = Math.round(img.width * scale);
          canvas.height = Math.round(img.height * scale);
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // ----- GPS + reverse geocoding -----
  function setAddressUI(text, cls) {
    const el = document.getElementById('addressDisplay');
    el.className = 'address-display compact ' + (cls || '');
    document.getElementById('addressText').textContent = text;
  }

  function prefetchLocation() {
    if (geoFetchInFlight || !navigator.geolocation) return;
    geoFetchInFlight = true;
    setAddressUI('위치 확인 중…', 'loading');
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        currentGps = {
          lat: +pos.coords.latitude.toFixed(6),
          lon: +pos.coords.longitude.toFixed(6),
          accuracy: Math.round(pos.coords.accuracy)
        };
        setAddressUI(`GPS ${currentGps.lat}, ${currentGps.lon} · 주소 변환 중…`, 'loading');
        const addr = await reverseGeocode(currentGps.lat, currentGps.lon);
        currentAddress = addr;
        if (addr) {
          setAddressUI(addr, '');
        } else {
          setAddressUI(`GPS ${currentGps.lat}, ${currentGps.lon} (주소 조회 실패)`, '');
        }
        geoFetchInFlight = false;
      },
      (err) => {
        console.warn('geolocation error:', err);
        setAddressUI('위치 권한 없음 · 사진에 GPS 미포함', 'empty');
        geoFetchInFlight = false;
      },
      { timeout: 12000, enableHighAccuracy: true, maximumAge: 30000 }
    );
  }

  async function reverseGeocode(lat, lon) {
    // Free Nominatim API. Korean addresses adequate for general use.
    // Swap to Kakao Local API for production-grade Korean addressing (see README).
    try {
      const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ko&zoom=18`;
      const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
      if (!res.ok) return null;
      const data = await res.json();
      // Nominatim returns Western-order display_name; reverse for Korean order
      if (data.display_name) {
        const parts = data.display_name.split(',').map(s => s.trim()).reverse();
        return parts.slice(0, 6).join(' ');  // skip country at end
      }
      return null;
    } catch(e) {
      console.warn('reverseGeocode failed:', e);
      return null;
    }
  }

  // ----- Watermark composition: bake metadata into JPEG -----
  async function stampPhoto(srcDataUrl, info) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);

        const W = canvas.width;
        const H = canvas.height;
        const pad = Math.round(W * 0.025);
        const baseFont = Math.max(18, Math.round(W / 55));

        // Bottom gradient backdrop for readability
        const overlayH = Math.round(H * 0.28);
        const grad = ctx.createLinearGradient(0, H - overlayH, 0, H);
        grad.addColorStop(0, 'rgba(0,0,0,0)');
        grad.addColorStop(0.4, 'rgba(0,0,0,0.55)');
        grad.addColorStop(1, 'rgba(0,0,0,0.92)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, H - overlayH, W, overlayH);

        ctx.textBaseline = 'bottom';
        ctx.textAlign = 'left';
        let y = H - pad;

        // Line 1 (bottom): 사업장 · 층수  ← biggest, yellow
        const headline = [info.site, info.floor].filter(Boolean).join(' · ') || '사업장 미지정';
        ctx.font = `900 ${Math.round(baseFont * 1.35)}px "Noto Sans KR", sans-serif`;
        ctx.fillStyle = '#ffd60a';
        ctx.fillText(headline, pad, y);
        y -= Math.round(baseFont * 1.7);

        // Line 2: 자유입력 메모  ← white, medium
        if (info.memo) {
          ctx.font = `600 ${Math.round(baseFont * 1.0)}px "Noto Sans KR", sans-serif`;
          ctx.fillStyle = '#ffffff';
          // Wrap long memo to 2 lines if needed
          const lines = wrapText(ctx, info.memo, W - pad * 2, 2);
          for (let i = lines.length - 1; i >= 0; i--) {
            ctx.fillText(lines[i], pad, y);
            y -= Math.round(baseFont * 1.25);
          }
        }

        // Line 3: 주소
        if (info.address) {
          ctx.font = `400 ${Math.round(baseFont * 0.85)}px "Noto Sans KR", sans-serif`;
          ctx.fillStyle = '#c8d0e0';
          const addrLines = wrapText(ctx, '📍 ' + info.address, W - pad * 2, 2);
          for (let i = addrLines.length - 1; i >= 0; i--) {
            ctx.fillText(addrLines[i], pad, y);
            y -= Math.round(baseFont * 1.05);
          }
        }

        // Line 4 (top of overlay): datetime + GPS  ← small, gray, monospace
        ctx.font = `700 ${Math.round(baseFont * 0.75)}px "JetBrains Mono", monospace`;
        ctx.fillStyle = '#8893a8';
        let metaLine = info.datetimeStr;
        if (info.gps) {
          metaLine += `  ·  ${info.gps.lat}, ${info.gps.lon}  ·  ±${info.gps.accuracy}m`;
        }
        ctx.fillText(metaLine, pad, y);

        // Top-right brand watermark
        ctx.font = `900 ${Math.round(baseFont * 0.95)}px "Noto Sans KR", sans-serif`;
        ctx.textAlign = 'right';
        ctx.textBaseline = 'top';
        ctx.fillStyle = 'rgba(255,214,10,0.92)';
        ctx.fillText('대영소방', W - pad, pad);
        ctx.font = `700 ${Math.round(baseFont * 0.55)}px "JetBrains Mono", monospace`;
        ctx.fillStyle = 'rgba(232,236,243,0.7)';
        ctx.fillText('FIELD LOG', W - pad, pad + Math.round(baseFont * 1.1));

        resolve(canvas.toDataURL('image/jpeg', 0.98));
      };
      img.src = srcDataUrl;
    });
  }

  function wrapText(ctx, text, maxWidth, maxLines) {
    const words = text.split(/(\s+)/);
    const lines = [];
    let cur = '';
    for (const w of words) {
      const test = cur + w;
      if (ctx.measureText(test).width > maxWidth && cur) {
        lines.push(cur.trim());
        cur = w.trimStart();
        if (lines.length >= maxLines - 1) break;
      } else {
        cur = test;
      }
    }
    if (cur.trim()) lines.push(cur.trim());
    // Truncate last line with ellipsis if it would still overflow
    if (lines.length === maxLines) {
      let last = lines[lines.length - 1];
      while (last.length > 4 && ctx.measureText(last + '…').width > maxWidth) {
        last = last.slice(0, -1);
      }
      lines[lines.length - 1] = last + (lines.length === maxLines && text.length > lines.join(' ').length ? '…' : '');
    }
    return lines;
  }

  // ===== Voice (dual-mode: native Capacitor plugin / Web Speech API) =====
  const speech = {
    mode: null,             // 'native' | 'web' | null
    isListening: false,
    nativePlugin: null,
    recognition: null,
    initialText: '',        // textarea content when mic was pressed
    nativeBuffer: '',       // accumulated final text across native session restarts
    _lastPartial: '',
    onPartial: null,
    onError: null,

    async init() {
      // 1) Try native plugin (Capacitor)
      if (window.Capacitor?.isNativePlatform?.() && window.Capacitor?.Plugins?.SpeechRecognition) {
        try {
          const SR = Capacitor.Plugins.SpeechRecognition;
          const { available } = await SR.available();
          if (available) {
            this.mode = 'native';
            this.nativePlugin = SR;

            await SR.addListener('partialResults', (data) => {
              const current = data?.matches?.[0] || '';
              this._lastPartial = current;
              this.onPartial?.(this._combine(current));
            });

            await SR.addListener('listeningState', ({ status }) => {
              if (status === 'stopped' && this.isListening) {
                // Native session ended; commit partial to buffer & restart for continuous mode
                if (this._lastPartial) {
                  this.nativeBuffer = (this.nativeBuffer ? this.nativeBuffer + ' ' : '') + this._lastPartial;
                  this._lastPartial = '';
                }
                setTimeout(() => { if (this.isListening) this._startNativeSession(); }, 80);
              }
            });

            return true;
          }
        } catch(e) { console.warn('native speech unavailable:', e); }
      }

      // 2) Web fallback
      const WebSR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (WebSR) {
        this.mode = 'web';
        this.recognition = new WebSR();
        this.recognition.lang = 'ko-KR';
        this.recognition.continuous = true;
        this.recognition.interimResults = true;

        let webFinal = '';
        this.recognition.onresult = (event) => {
          let interim = '';
          for (let i = event.resultIndex; i < event.results.length; i++) {
            const t = event.results[i][0].transcript;
            if (event.results[i].isFinal) webFinal += t;
            else interim += t;
          }
          this.nativeBuffer = webFinal;
          this.onPartial?.(this._combine(interim));
        };

        this.recognition.onerror = (e) => {
          if (e.error === 'no-speech' || e.error === 'aborted') return;
          if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
            this.onError?.('마이크 권한 거부됨');
            this.stop();
          }
        };

        this.recognition.onend = () => {
          if (this.isListening) {
            try { this.recognition.start(); } catch(e) {}
          }
        };
        return true;
      }

      return false;
    },

    _combine(currentSegment) {
      const parts = [this.initialText, this.nativeBuffer, currentSegment]
        .map(p => (p || '').trim()).filter(Boolean);
      return parts.join(' ');
    },

    async _startNativeSession() {
      try {
        const perm = await this.nativePlugin.checkPermissions();
        if (perm.speechRecognition !== 'granted') {
          const req = await this.nativePlugin.requestPermissions();
          if (req.speechRecognition !== 'granted') {
            this.onError?.('마이크 권한이 필요합니다');
            this.isListening = false;
            return;
          }
        }
        await this.nativePlugin.start({
          language: 'ko-KR',
          maxResults: 1,
          prompt: '',
          partialResults: true,
          popup: false,
        });
      } catch(e) {
        console.warn('native start failed:', e);
        this.onError?.('녹음 시작 실패');
        this.isListening = false;
      }
    },

    start(initialText) {
      this.isListening = true;
      this.initialText = initialText || '';
      this.nativeBuffer = '';
      this._lastPartial = '';
      if (this.mode === 'native') {
        this._startNativeSession();
      } else if (this.mode === 'web') {
        try { this.recognition.start(); } catch(e) {}
      }
    },

    async stop() {
      this.isListening = false;
      if (this.mode === 'native') {
        try { await this.nativePlugin.stop(); } catch(e) {}
      } else if (this.mode === 'web') {
        try { this.recognition.stop(); } catch(e) {}
      }
    },

    get isAvailable() { return this.mode !== null; }
  };

  // Wire up speech callbacks
  speech.onPartial = (text) => {
    document.getElementById('memo').value = text;
  };
  speech.onError = (msg) => {
    toast(msg);
    updateMicUI(false);
  };

  // 음성 입력 UI 제거됨 — 직접 타이핑만 사용
  function updateMicUI(_listening) { /* noop */ }
  function startMic() { /* removed */ }
  function stopMic() {
    if (speech && speech.isListening) {
      try { speech.stop(); } catch(e) {}
    }
  }

  // ===== Filename + JPEG save helpers =====
  function sanitize(s, maxLen) {
    return (s || '').toString()
      .replace(/[\/\\:*?"<>|\n\r\t]/g, '')
      .replace(/\s+/g, ' ')
      .trim()
      .slice(0, maxLen || 30);
  }

  function buildFilename(rec) {
    const d = new Date(rec.timestamp);
    const ymd = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    const hm = `${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
    const site = sanitize(rec.site, 20) || '미지정';
    const memo = sanitize(rec.memo, 25) || '메모없음';
    return `${site}_${memo}_${ymd}_${hm}.jpg`;
  }

  // ⬆ 공유 버튼 전용 — share sheet 열어 사용자가 갤러리/드라이브/카톡 등 선택
  async function saveJpeg(dataUrl, filename) {
    if (window.Capacitor?.isNativePlatform?.()
        && Capacitor.Plugins?.Filesystem
        && Capacitor.Plugins?.Share) {
      try {
        const { Filesystem, Share } = Capacitor.Plugins;
        const base64 = dataUrl.split(',')[1];
        const writeRes = await Filesystem.writeFile({
          path: filename,
          data: base64,
          directory: 'CACHE'
        });
        await Share.share({
          title: filename,
          url: writeRes.uri,
          dialogTitle: '저장 / 공유'
        });
        return true;
      } catch(e) {
        if (e?.message?.includes('canceled')) return false;
        console.warn('native share failed:', e);
      }
    }

    // Web: 다운로드 폴더로
    try {
      const blob = await (await fetch(dataUrl)).blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      return true;
    } catch(e) {
      console.error('web download failed:', e);
      return false;
    }
  }

  function updateSiteList() {
    const sites = [...new Set(records.map(r => r.site).filter(Boolean))];
    const dl = document.getElementById('siteList');
    dl.innerHTML = sites.map(s => `<option value="${escapeHtml(s)}">`).join('');
  }

  // ===== Save record (stamp metadata onto JPEG, store in DB, share immediately) =====
  document.getElementById('btnSave').addEventListener('click', async () => {
    if (!currentPhoto) {
      toast('사진을 먼저 촬영하세요');
      return;
    }
    if (speech.isListening) stopMic();

    const site = document.getElementById('inputSite').value.trim();
    const floor = document.getElementById('inputFloor').value.trim();
    const memo = document.getElementById('memo').value.trim();

    if (!site) {
      if (!confirm('사업장이 비어있습니다. 그래도 저장하시겠습니까?')) return;
    }

    const now = new Date();
    const datetimeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    const saveBtn = document.getElementById('btnSave');
    saveBtn.disabled = true;
    saveBtn.textContent = '합성 중...';

    try {
      // Bake all metadata as watermark onto the JPEG
      const stamped = await stampPhoto(currentPhoto, {
        site, floor, memo,
        address: currentAddress,
        gps: currentGps,
        datetimeStr
      });

      const rec = {
        id: Date.now(),
        timestamp: now.toISOString(),
        site, floor, memo,
        address: currentAddress,
        gps: currentGps,
        photo: stamped
      };

      records.unshift(rec);
      await Store.put(rec);
      updateSiteList();
      renderList();

      // 리스트 저장만 — 갤러리/공유는 아래 [공유] 버튼 누를 때만
      resetCurrent();
      toast('리스트에 저장됨');
    } catch(e) {
      console.error('save error:', e);
      toast('저장 실패');
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = '입력완료';
    }
  });

  document.getElementById('btnReset').addEventListener('click', resetCurrent);

  function resetCurrent() {
    currentPhoto = null;
    // Keep site name + floor (likely same site for consecutive records)
    // Clear: memo, photo preview, photo input
    document.getElementById('memo').value = '';
    document.getElementById('previewBox').innerHTML = '<span>아직 사진 없음</span>';
    document.getElementById('cameraInput').value = '';
    if (typeof speech !== 'undefined' && speech.isListening) stopMic();
  }

  // ===== Render list =====
  function renderList() {
    const list = document.getElementById('recordList');
    const cstr = String(records.length).padStart(3,'0');
    document.getElementById('recordCount').textContent = cstr;
    document.getElementById('listCount').textContent = cstr;

    if (records.length === 0) {
      list.innerHTML = '<div class="empty-state">아직 기록이 없습니다.</div>';
      return;
    }

    list.innerHTML = records.map(r => {
      const date = new Date(r.timestamp);
      const time = `${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
      const dateStr = `${date.getMonth()+1}/${date.getDate()}`;
      const thumb = r.photo
        ? `<img class="thumb" src="${r.photo}" alt="">`
        : `<div class="thumb">사진없음</div>`;
      const gpsInfo = r.gps ? ' · GPS' : '';
      const siteText = escapeHtml(r.site || '미지정');
      const floorBadge = r.floor ? `<span class="floor-badge">${escapeHtml(r.floor)}</span>` : '';
      const memoHtml = r.memo ? escapeHtml(r.memo) : '<em>메모 없음</em>';
      const addrHtml = r.address ? `<div class="addr">📍 ${escapeHtml(r.address)}</div>` : '';
      return `<div class="record-card">
        <input type="checkbox" class="record-chk" data-id="${r.id}">
        ${thumb}
        <div class="body">
          <div class="meta">${dateStr} ${time}${gpsInfo}</div>
          <div class="site-line">${siteText} ${floorBadge}</div>
          <div class="text">${memoHtml}</div>
          ${addrHtml}
        </div>
        <div class="actions">
          <button class="btn-share" data-id="${r.id}" title="JPEG 공유/저장">⬆</button>
          <button class="btn-del" data-id="${r.id}" title="삭제">✕</button>
        </div>
      </div>`;
    }).join('');

    list.querySelectorAll('.btn-share').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const id = parseInt(e.currentTarget.getAttribute('data-id'));
        const rec = records.find(r => r.id === id);
        if (!rec || !rec.photo) { toast('사진 없음'); return; }
        const filename = buildFilename(rec);
        await saveJpeg(rec.photo, filename);
      });
    });

    list.querySelectorAll('.record-chk').forEach(chk => {
      chk.addEventListener('change', updateSelectedInfo);
    });
    updateSelectedInfo();
    // 탭 카운트 갱신
    const tabCount = document.getElementById('tabCount');
    if (tabCount) tabCount.textContent = records.length;
    list.querySelectorAll('.btn-del').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(e.currentTarget.getAttribute('data-id'));
        if (confirm('이 기록을 삭제하시겠습니까?')) {
          records = records.filter(r => r.id !== id);
          Store.remove(id);
          renderList();
          updateSiteList();
          toast('삭제됨');
        }
      });
    });
  }

  function escapeHtml(s) {
    return (s||'').replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  // ===== 탭 전환 =====
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const target = btn.getAttribute('data-tab');
      document.getElementById('panelCapture').hidden = (target !== 'capture');
      document.getElementById('panelList').hidden = (target !== 'list');
    });
  });

  // ===== 선택 카운트 표시 =====
  function getSelectedIds() {
    return Array.from(document.querySelectorAll('.record-chk:checked'))
      .map(c => parseInt(c.getAttribute('data-id')));
  }
  function updateSelectedInfo() {
    const n = getSelectedIds().length;
    const total = document.querySelectorAll('.record-chk').length;
    const info = document.getElementById('selectedInfo');
    if (info) info.textContent = `${n} / ${total}건 선택됨`;
    const all = document.getElementById('chkSelectAll');
    if (all) all.checked = (n > 0 && n === total);
  }
  document.getElementById('chkSelectAll').addEventListener('change', (e) => {
    const checked = e.currentTarget.checked;
    document.querySelectorAll('.record-chk').forEach(c => { c.checked = checked; });
    updateSelectedInfo();
  });

  // ===== 선택 공유 =====
  document.getElementById('btnShareSelected').addEventListener('click', async () => {
    const ids = getSelectedIds();
    if (ids.length === 0) { toast('선택된 항목 없음'); return; }
    if (!confirm(`${ids.length}건의 사진을 순차로 공유합니다.\n각 사진마다 저장 위치를 선택하세요.`)) return;
    let done = 0;
    for (const id of ids) {
      const rec = records.find(r => r.id === id);
      if (!rec?.photo) continue;
      const ok = await saveJpeg(rec.photo, buildFilename(rec));
      if (ok) done++;
      await new Promise(r => setTimeout(r, 200));
    }
    toast(`${done}/${ids.length}건 공유 완료`);
  });

  // ===== 전체 공유 =====
  document.getElementById('btnShareAll').addEventListener('click', async () => {
    if (records.length === 0) { toast('공유할 기록 없음'); return; }
    if (!confirm(`전체 ${records.length}건의 사진을 순차로 공유합니다.\n각 사진마다 저장 위치를 선택하세요.`)) return;
    let done = 0;
    for (const rec of records) {
      if (!rec.photo) continue;
      const ok = await saveJpeg(rec.photo, buildFilename(rec));
      if (ok) done++;
      await new Promise(r => setTimeout(r, 200));
    }
    toast(`${done}/${records.length}건 공유 완료`);
  });

  // ===== 선택 삭제 =====
  document.getElementById('btnDelSelected').addEventListener('click', () => {
    const ids = getSelectedIds();
    if (ids.length === 0) { toast('선택된 항목 없음'); return; }
    if (!confirm(`선택한 ${ids.length}건을 삭제합니까?\n복구할 수 없습니다.`)) return;
    ids.forEach(id => Store.remove(id));
    records = records.filter(r => !ids.includes(r.id));
    renderList();
    updateSiteList();
    toast(`${ids.length}건 삭제됨`);
  });

  // ===== Clear all =====
  document.getElementById('btnClearAll').addEventListener('click', () => {
    if (records.length === 0) return;
    if (confirm(`전체 ${records.length}건을 삭제하시겠습니까?\n복구할 수 없습니다.`)) {
      records = [];
      Store.clear();
      renderList();
      toast('전체 삭제됨');
    }
  });

  // ===== Update check =====
  function isNewer(remote, local) {
    const r = String(remote).split('.').map(n => parseInt(n) || 0);
    const l = String(local).split('.').map(n => parseInt(n) || 0);
    for (let i = 0; i < Math.max(r.length, l.length); i++) {
      const a = r[i] || 0, b = l[i] || 0;
      if (a > b) return true;
      if (a < b) return false;
    }
    return false;
  }

  // 업데이트 신호등 상태 설정 — unknown / checking / ok / new / error
  function setUpdateLight(state, label) {
    const light = document.getElementById('updateLight');
    const text = document.getElementById('updateStatusText');
    if (light) light.className = 'update-light ' + state;
    if (text) text.textContent = label;
  }

  async function checkForUpdates(silent) {
    if (!UPDATE_CHECK_URL || UPDATE_CHECK_URL.includes('YOUR-DOMAIN')) {
      setUpdateLight('error', '미설정');
      if (!silent) toast('업데이트 서버 URL 미설정');
      return;
    }
    setUpdateLight('checking', '확인중');
    try {
      const res = await fetch(UPDATE_CHECK_URL + '?t=' + Date.now(), {
        cache: 'no-store',
        headers: { 'Accept': 'application/json' }
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const info = await res.json();

      if (!info.latest || !info.url) throw new Error('invalid version.json');

      if (isNewer(info.latest, APP_VERSION)) {
        setUpdateLight('new', `NEW v${info.latest}`);
        showUpdateModal(info);
        return true;
      } else {
        setUpdateLight('ok', '최신');
        if (!silent) toast(`최신 버전 사용 중 (v${APP_VERSION})`);
      }
    } catch(e) {
      console.warn('update check failed:', e);
      setUpdateLight('error', '오프라인');
      if (!silent) toast('업데이트 확인 실패');
    }
    return false;
  }

  function showUpdateModal(info) {
    document.getElementById('modalCurrentVersion').textContent = APP_VERSION;
    document.getElementById('modalNewVersion').textContent = info.latest;
    document.getElementById('modalNotes').textContent = info.notes || '';

    const actions = document.getElementById('modalActions');
    actions.classList.toggle('force', !!info.force);

    document.getElementById('btnUpdateSkip').onclick = () => {
      if (!info.force) document.getElementById('updateModal').hidden = true;
    };

    // 🗑 기존 앱 제거 — Android 제거 다이얼로그 자동 호출
    document.getElementById('btnUninstallSelf').onclick = async () => {
      if (!window.Capacitor?.isNativePlatform?.()) {
        toast('웹에서는 제거 불가 — 폰에서만 동작');
        return;
      }
      const recCount = records.length;
      const warn = recCount > 0
        ? `⚠️ 저장된 ${recCount}건의 기록이 사라집니다.\n\n먼저 📋 사진 리스트 탭에서 "⬆ 전체 공유"로 백업했나요?\n\n진짜 제거할까요?`
        : '기존 앱을 제거합니다.\nAndroid가 제거 확인 화면을 띄울 거예요.\n\n계속할까요?';
      if (!confirm(warn)) return;
      const PKG = 'kr.daeyoung.sobang.fieldlog';
      const intentUrl = `intent:#Intent;action=android.intent.action.DELETE;data=package:${PKG};end`;
      try {
        // 1순위: Browser 플러그인으로 intent URL 열기
        if (Capacitor.Plugins?.Browser?.open) {
          await Capacitor.Plugins.Browser.open({ url: intentUrl });
        } else {
          window.location.href = intentUrl;
        }
        toast('Android 제거 화면에서 "확인" 누르세요');
      } catch (e) {
        // 폴백: 앱 정보 페이지 열기 (사용자가 거기서 제거 탭)
        try {
          const settingsUrl = `intent:#Intent;action=android.settings.APPLICATION_DETAILS_SETTINGS;data=package:${PKG};end`;
          if (Capacitor.Plugins?.Browser?.open) {
            await Capacitor.Plugins.Browser.open({ url: settingsUrl });
          } else {
            window.location.href = settingsUrl;
          }
          toast('앱 정보 → 제거 버튼 탭하세요');
        } catch (e2) {
          console.error('uninstall intent failed:', e, e2);
          toast('제거 화면 열기 실패 — 폰 설정 > 앱에서 직접 제거');
        }
      }
    };

    document.getElementById('btnUpdateNow').onclick = async () => {
      // Open APK URL in system browser → Android download manager → user taps to install
      try {
        if (window.Capacitor?.isNativePlatform?.() && Capacitor.Plugins?.Browser) {
          await Capacitor.Plugins.Browser.open({
            url: info.url,
            presentationStyle: 'fullscreen'
          });
        } else {
          window.open(info.url, '_blank');
        }
        toast('다운로드 시작됨. 다운로드 폴더에서 APK 탭하여 설치');
        if (!info.force) document.getElementById('updateModal').hidden = true;
      } catch(e) {
        console.error('open URL failed:', e);
        toast('다운로드 페이지 열기 실패');
      }
    };

    document.getElementById('updateModal').hidden = false;
  }

  // Wire up clickable version tag → manual check
  document.getElementById('versionTag').addEventListener('click', () => {
    toast('업데이트 확인 중…');
    checkForUpdates(false);
  });

  // ===== Init =====
  (async function init() {
    document.getElementById('appVer').textContent = APP_VERSION;
    updateDateLabel();
    await Store.load();
    updateSiteList();

    // Native: configure status bar to match theme
    if (window.Capacitor?.isNativePlatform?.() && Capacitor.Plugins?.StatusBar) {
      try {
        const { StatusBar } = Capacitor.Plugins;
        await StatusBar.setBackgroundColor({ color: '#0a0e1a' });
        await StatusBar.setStyle({ style: 'DARK' });
      } catch(e) { /* ignore */ }
    }

    console.log('[FieldLog] v' + APP_VERSION + ' · Capacitor:', !!window.Capacitor?.isNativePlatform?.());

    // 앱 시작 시 자동 업데이트 확인 — 새 버전이면 모달 자동 표시
    setTimeout(() => checkForUpdates(true), 1500);
  })();
</script>

</body>
</html>
