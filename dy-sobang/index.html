<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대영소방 사진기록 · 앱 다운로드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0e1a; color: #e8ecf3;
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card {
    max-width: 420px; width: 100%;
    background: #131826; border: 1px solid #2a3148;
    border-top: 4px solid #ffd60a;
    padding: 32px 24px;
  }
  .brand {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    color: #ffd60a; letter-spacing: 2.5px;
    text-transform: uppercase;
  }
  h1 { font-size: 26px; font-weight: 900; margin-top: 4px; letter-spacing: -0.5px; }
  .ver {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: #8893a8;
    margin-top: 6px; letter-spacing: 1px;
  }
  .qr-box {
    background: #fff; padding: 16px;
    margin: 24px auto; width: 220px;
    display: flex; justify-content: center;
  }
  .download-btn {
    display: block; width: 100%;
    background: #ffd60a; color: #000;
    text-align: center; text-decoration: none;
    padding: 18px;
    font-weight: 800; font-size: 16px;
    letter-spacing: -0.3px;
    margin-top: 16px;
  }
  .download-btn:active { opacity: 0.85; }
  .steps {
    background: #1c2236; padding: 16px;
    margin-top: 20px; font-size: 13px; line-height: 1.7;
  }
  .steps h3 {
    font-size: 11px; color: #ffd60a;
    letter-spacing: 1.5px; font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; margin-bottom: 10px; font-weight: 700;
  }
  .steps ol { padding-left: 18px; color: #c8d0e0; }
  .steps li { margin-bottom: 4px; }
  .notes {
    border-left: 3px solid #ffd60a;
    background: #1c2236;
    padding: 12px 14px;
    margin-top: 16px;
    font-size: 13px; line-height: 1.5;
    white-space: pre-wrap;
  }
  .notes h3 {
    font-size: 10px; color: #ffd60a; letter-spacing: 1.5px;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 6px; font-weight: 700;
  }
  .meta {
    color: #8893a8; font-size: 11px;
    margin-top: 14px; text-align: center;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">DY-SOBANG · FIELD LOG</div>
    <h1>대영소방 사진기록</h1>
    <div class="ver">v<span id="ver">1.0.0</span> · ANDROID</div>

    <div class="qr-box">
      <!-- QR code: replace src with actual QR (or use API like qrserver.com) -->
      <img id="qr" alt="다운로드 QR 코드" width="190" height="190">
    </div>

    <a class="download-btn" id="apkLink" href="#">
      📥 APK 다운로드
    </a>

    <div class="notes">
      <h3>변경사항</h3>
      <span id="notes">로딩 중…</span>
    </div>

    <div class="steps">
      <h3>설치 방법</h3>
      <ol>
        <li>위 버튼 탭 → APK 다운로드</li>
        <li>알림창에서 다운로드된 APK 탭</li>
        <li>"이 출처 허용" → 한 번 켜기</li>
        <li>설치 → 완료</li>
        <li>첫 실행 시 권한 3개 허용 (카메라·마이크·위치)</li>
      </ol>
    </div>

    <div class="meta" id="meta">로딩 중…</div>
  </div>

<script>
  // Fetch latest version info and populate the page
  fetch('version.json?t=' + Date.now(), { cache: 'no-store' })
    .then(r => r.json())
    .then(info => {
      document.getElementById('ver').textContent = info.latest;
      document.getElementById('notes').textContent = info.notes || '(없음)';
      document.getElementById('apkLink').href = info.url;

      const qrSrc = 'https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=' +
                    encodeURIComponent(info.url);
      document.getElementById('qr').src = qrSrc;

      const date = new Date(info.releasedAt || Date.now());
      document.getElementById('meta').textContent =
        `RELEASED ${date.toISOString().slice(0,10).replace(/-/g,'.')}` +
        (info.force ? ' · 필수 업데이트' : '');
    })
    .catch(e => {
      document.getElementById('notes').textContent = '버전 정보 로드 실패';
      document.getElementById('meta').textContent = 'ERROR';
    });
</script>
</body>
</html>
